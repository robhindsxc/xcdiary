<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notepad Ultimate Integrated</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f3f3f3}
header{background:#A50034;color:#fff;padding:14px;text-align:center;font-size:24px;font-weight:bold}
.wrap{max-width:1200px;margin:auto;padding:12px}
.search,.field,textarea,select{width:100%;padding:10px;box-sizing:border-box;margin:4px 0}
.bar{background:#A50034;color:#fff;border-radius:12px;margin:10px 0;overflow:hidden}
.barhead{padding:12px;cursor:pointer}
.details{display:none;background:#fff;color:#000;padding:12px}
.btn{padding:8px 12px;border:none;border-radius:8px;margin:3px;cursor:pointer}
.fab{position:fixed;right:20px;bottom:20px;width:70px;height:70px;border:none;border-radius:50%;background:#f0c300;font-size:40px}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6)}
.box{background:#fff;max-width:700px;margin:40px auto;padding:15px;border-radius:12px}
.row{display:flex;gap:8px}.row>*{flex:1}
.update{border-left:4px solid #A50034;padding-left:8px;margin:8px 0}
</style>
</head>
<body>
<header>NOTEPAD</header>

<div class="wrap">
<input id="search" class="search" placeholder="Search..." onkeyup="render()">
<div id="list"></div>
</div>

<button class="fab" onclick="openNew()">+</button>

<div class="modal" id="newModal">
<div class="box">
<h2>Add Details</h2>
<input id="jobNo" class="field" placeholder="Job Number">
<div class="row">
<div><label>Book On</label><input id="bookOn" type="time" class="field"></div>
<div><label>Book Off</label><input id="bookOff" type="time" class="field"></div>
</div>

<select id="reason" class="field">
<option>General Shift Log</option>
<option>Operational Incident</option>
<option>Customer Illness</option>
<option>Train Fault</option>
<option>Door Fault</option>
<option>Other</option>
</select>
<textarea id="report" placeholder="Initial Details"></textarea>
<button class="btn" onclick="saveLog()">Save</button>
<button class="btn" onclick="closeModal('newModal')">Cancel</button>
</div>
</div>

<div class="modal" id="actionModal">
<div class="box">
<h2 id="actionTitle"></h2>
<div id="actionFields"></div>
<button class="btn" onclick="saveAction()">Save</button>
<button class="btn" onclick="closeModal('actionModal')">Cancel</button>
</div>
</div>

<script>
let logs=JSON.parse(localStorage.getItem('notepad_ultimate')||'[]');
let activeIndex=null,activeAction=''; let editingIndex=null;

function saveStore(){localStorage.setItem('notepad_ultimate',JSON.stringify(logs));}
function stamp(){return new Date().toLocaleString();}
function closeModal(id){document.getElementById(id).style.display='none';}
function openNew(){newModal.style.display='block';}

function nextRef(){
 const d=new Date();
 const dp=String(d.getDate()).padStart(2,'0')+String(d.getMonth()+1).padStart(2,'0')+d.getFullYear();
 let highest=0;
 logs.filter(x=>x.ref.startsWith('XC'+dp+'-')).forEach(x=>{
  const n=parseInt(x.ref.split('-')[1])||0;
  if(n>highest) highest=n;
 });
 return `XC${dp}-${String(highest+1).padStart(2,'0')}`;
}

function saveLog(){
 
 if(editingIndex!==null){
   logs[editingIndex].jobNo=jobNo.value;
   logs[editingIndex].bookOn=bookOn.value;
   logs[editingIndex].bookOff=bookOff.value;
   
   logs[editingIndex].reason=reason.value;
   editingIndex=null;
 } else {
 logs.push({
  ref:nextRef(),jobNo:jobNo.value,bookOn:bookOn.value,bookOff:bookOff.value,
  reason:reason.value,trains:[],equipment:[],delays:[],revenue:[],shiftEnded:false,
  updates:[{time:stamp(),text:report.value||'Log Created'}],expanded:false
 });
 }
 saveStore();closeModal('newModal');render();
}

function openAction(i,t){
 activeIndex=i;activeAction=t;
 actionTitle.innerText=t.toUpperCase();
 let h='';
 if(t==='train') h='<input id=f1 class=field placeholder="Headcode 1V50"><input id=f2 class=field placeholder="Unit 6 digits">';
 if(t==='equipment') h='<input id=f1 class=field placeholder="BWV Number"><input id=f2 class=field placeholder="STAR Mobile Number">';
 if(t==='defect') h='<input id=f1 class=field placeholder="Unit"><textarea id=f2 placeholder="Defect"></textarea>';
 if(t==='assist') h='<input id=f1 class=field placeholder="Assist Type"><input id=f2 class=field placeholder="Destination">';
 if(t==='details') h='<textarea id=f1 placeholder="Enter details"></textarea>';
 if(t==='count') h='<input id=f1 class=field placeholder="Location"><input id=f2 class=field placeholder="First Class"><input id=f3 class=field placeholder="Standard Class">';
 if(t==='delay') h='<input id=f1 class=field placeholder="Delay Minutes"><input id=f2 class=field placeholder="Cause">';
 if(t==='revenue') h='<input id=f1 class=field placeholder="Ticket Scans"><input id=f2 class=field placeholder="Ticket Sales (£)">';
 if(t==='note') h='<textarea id=f1 placeholder="Enter note"></textarea>';
 actionFields.innerHTML=h;
 actionModal.style.display='block';
}

function saveAction(){
 let l=logs[activeIndex];
 if(activeAction==='train'){
   if(!/^[0-9][A-Z][0-9]{2}$/.test(f1.value.toUpperCase())) return alert('Invalid Headcode');
   if(!/^\d{6}$/.test(f2.value)) return alert('Unit must be 6 digits');
   l.trains.push({headcode:f1.value.toUpperCase(),unit:f2.value});
   l.updates.push({time:stamp(),text:`TRAIN ADDED\nHeadcode: ${f1.value.toUpperCase()}\nUnit: ${f2.value}`});
 }
 if(activeAction==='equipment'){
   if(!/^\d+$/.test(f1.value)||!/^\d+$/.test(f2.value)) return alert('Numbers only');
   l.updates.push({time:stamp(),text:`EQUIPMENT\nBWV: ${f1.value}\nSTAR: ${f2.value}`});
 }
 if(activeAction==='defect') l.updates.push({time:stamp(),text:`DEFECT\nUnit: ${f1.value}\n${f2.value}`});
 if(activeAction==='assist') l.updates.push({time:stamp(),text:`ASSIST\nType: ${f1.value}\nDestination: ${f2.value}`});
 if(activeAction==='details') l.updates.push({time:stamp(),text:`DETAILS\n${f1.value}`});
 if(activeAction==='count'){
   const total=(+f2.value||0)+(+f3.value||0);
   l.updates.push({time:stamp(),text:`PASSENGER COUNT\nLocation: ${f1.value}\nFirst Class: ${f2.value}\nStandard Class: ${f3.value}\nTotal: ${total}`});
 }
 if(activeAction==='revenue'){
   const scans=parseInt(f1.value||0);
   const sales=parseFloat(f2.value||0);
   const scanCommission=scans*0.02;
   const salesCommission=sales*0.06;
   const totalCommission=scanCommission+salesCommission;
   l.revenue.push({scans,sales,commission:totalCommission});
   l.updates.push({time:stamp(),text:`REVENUE\nTicket Scans: ${scans}\nTicket Sales: £${sales.toFixed(2)}\nScan Commission: £${scanCommission.toFixed(2)}\nSales Commission: £${salesCommission.toFixed(2)}\nTotal Commission: £${totalCommission.toFixed(2)}`});
 }
 
 if(activeAction==='delay'){
   const mins=parseInt(f1.value||0);
   l.delays.push({minutes:mins,cause:f2.value});
   l.updates.push({time:stamp(),text:`DELAY\nMinutes: ${mins}\nCause: ${f2.value}`});
 }
 saveStore();closeModal('actionModal');render();
}


function editShift(i){
 const x=logs[i];
 editingIndex=i;
 jobNo.value=x.jobNo||'';
 bookOn.value=x.bookOn||'';
 bookOff.value=x.bookOff||'';
 
 reason.value=x.reason||'';
 newModal.style.display='block';
}

function deleteShift(i){
 if(!confirm('Delete this shift?')) return;
 logs.splice(i,1);
 saveStore(); render();
}

function endShift(i){
 logs[i].shiftEnded=true;
 logs[i].shiftEndTime=new Date().toLocaleTimeString();
 logs[i].updates.push({time:stamp(),text:'SHIFT ENDED'});
 saveStore(); render();
}

function toggle(i){logs[i].expanded=!logs[i].expanded;render();}

function reportText(x){
 let delayTotal=x.delays.reduce((a,b)=>a+b.minutes,0);
 let totalScans=(x.revenue||[]).reduce((a,b)=>a+b.scans,0);
 let totalSales=(x.revenue||[]).reduce((a,b)=>a+b.sales,0);
 let totalCommission=(x.revenue||[]).reduce((a,b)=>a+b.commission,0);
 return `Reference: ${x.ref}
Job Number: ${x.jobNo}
Book On: ${x.bookOn}
Book Off: ${x.bookOff}
Headcodes Worked: ${x.trains.map(t=>t.headcode).join(', ')}\nStatus: ${x.shiftEnded?'COMPLETE':'ACTIVE'}

Total Delays: ${x.delays.length}
Delay Minutes: ${delayTotal}

`+x.updates.map(u=>u.time+"\n"+u.text).join("\n\n");
}

function copyReport(i){navigator.clipboard.writeText(reportText(logs[i]));}

function render(){
 const q=(search.value||'').toLowerCase();
 list.innerHTML=logs.filter(x=>JSON.stringify(x).toLowerCase().includes(q)).map((x,i)=>`
 <div class="bar">
 <div class="barhead" onclick="toggle(${i})">
 <b>${x.ref}</b><br>${x.trains.length?x.trains.map(t=>t.headcode).join(' • '):'No Trains Added'}<br>Job ${x.jobNo||'-'} | ${x.bookOn||'--'}-${x.bookOff||'--'}${x.shiftEnded?'<br><b>✓ SHIFT COMPLETE</b>':''}
 </div>
 <div class="details" style="display:${x.expanded?'block':'none'}">
 ${x.updates.map(u=>'<div class="update"><b>'+u.time+'</b><br>'+u.text.replace(/\n/g,'<br>')+'</div>').join('')}
 <button class="btn" onclick="openAction(${i},'train')">Add Train</button>
 <button class="btn" onclick="openAction(${i},'equipment')">Add Equipment</button>
 <button class="btn" onclick="openAction(${i},'defect')">Defect</button>
 <button class="btn" onclick="openAction(${i},'assist')">Assist</button>
 <button class="btn" onclick="openAction(${i},'details')">Add Details</button>
 <button class="btn" onclick="openAction(${i},'count')">Passenger Count</button>
 <button class="btn" onclick="openAction(${i},'delay')">Delay</button>
 <button class="btn" onclick="openAction(${i},'revenue')">Revenue</button>
 
 <button class="btn" onclick="editShift(${i})">Edit Shift</button><button class="btn" onclick="endShift(${i})">End Shift</button><button class="btn" onclick="deleteShift(${i})">Delete Shift</button><button class="btn" onclick="copyReport(${i})">Copy Report</button>
 </div></div>`).join('');
}
render();
</script>
</body>
</html>
